<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Digital GHG Inventory{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="min-h-screen lg:flex">
    {% if current_user %}
    <aside class="bg-white border-r border-slate-200 lg:w-72">
      <div class="px-5 py-4 border-b border-slate-200">
        <a href="{{ url_for('dashboard') }}" class="text-lg font-semibold">Digital GHG Inventory</a>
        <p class="text-xs text-slate-500">{{ current_user.full_name }}</p>
      </div>
      <nav class="p-3 grid gap-1 text-sm">
        {% for item in nav_items %}
        <a class="nav-link" href="{{ item.href }}">{{ item.label }}</a>
        {% endfor %}
        <a class="nav-link" href="{{ url_for('auth.logout') }}">Logout</a>
      </nav>
    </aside>
    {% endif %}
    <main class="flex-1">
      <div class="mx-auto max-w-6xl px-5 py-8">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  <script src="{{ url_for('static', filename='js/sidebar.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
