{% extends "base.html" %}

{% block title %}Sign in - Digital GHG Inventory{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[70vh]">
  <div class="ghg-card w-full max-w-md bg-white border border-cardBorder p-5">
    <div class="text-center mb-8">
      <img src="{{ url_for('static', filename='favicon.svg') }}" alt="JSW Logo" class="h-16 mx-auto object-contain">
      <h1 class="ghg-login-subtitle mt-4 text-base font-medium text-slate-500">GHG & ESG Data Entry Portal</h1>
      <p class="text-xs text-slate-500 mt-1">Sign in to your account</p>
    </div>

    {% if error %}
    <div class="mb-6 border-l-4 border-red-jsw bg-red-50 p-4 text-xs text-red-sentback font-medium">
      {{ error }}
    </div>
    {% endif %}

    <form class="space-y-5" method="post">
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5" for="email">Email address</label>
        <input class="ghg-input w-full border border-inputBorder px-3 py-2.5 text-sm focus:outline-none focus:border-navy focus:ring-1 focus:ring-navy" id="email" name="email" type="email" required autofocus placeholder="Enter your email">
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5" for="password">Password</label>
        <input class="ghg-input w-full border border-inputBorder px-3 py-2.5 text-sm focus:outline-none focus:border-navy focus:ring-1 focus:ring-navy" id="password" name="password" type="password" required placeholder="Enter your password">
      </div>
      <button class="btn btn-primary w-full justify-center py-3" type="submit">
        Sign in
      </button>
    </form>
  </div>
</div>
{% endblock %}
