{% extends "base.html" %}

{% block title %}Login - Digital GHG Inventory{% endblock %}

{% block content %}
<section class="mx-auto max-w-md">
  <h1 class="text-2xl font-semibold">Login</h1>
  {% if error %}
  <div class="mt-4 rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
    {{ error }}
  </div>
  {% endif %}
  <form class="mt-6 space-y-4" method="post">
    <div>
      <label class="block text-sm font-medium" for="email">Email</label>
      <input class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2" id="email" name="email" type="email" required autofocus>
    </div>
    <div>
      <label class="block text-sm font-medium" for="password">Password</label>
      <input class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2" id="password" name="password" type="password" required>
    </div>
    <button class="rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white" type="submit">Login</button>
  </form>
</section>
{% endblock %}
