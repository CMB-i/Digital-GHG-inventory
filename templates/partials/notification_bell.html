<div class="relative inline-block text-left" id="notification-bell-container">
  <!-- Bell Button -->
  <button id="btn-bell" class="relative p-1.5 text-slate-400 hover:text-indigo-600 hover:bg-slate-100 rounded-full transition-all focus:outline-none" aria-label="Notifications">
    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
    </svg>
    <!-- Badge -->
    <span id="bell-badge" class="hidden absolute top-0.5 right-0.5 inline-flex items-center justify-center px-1.5 py-0.5 text-[9px] font-bold leading-none text-white transform translate-x-1/4 -translate-y-1/4 bg-rose-600 rounded-full">
      0
    </span>
  </button>

  <!-- Dropdown Menu -->
  <div id="bell-dropdown" class="hidden absolute right-0 lg:left-0 lg:right-auto mt-2 w-80 bg-white border border-slate-200 rounded-lg shadow-xl overflow-hidden z-50 origin-top-right">
    <div class="px-4 py-2 border-b border-slate-100 flex items-center justify-between bg-slate-50/70">
      <span class="text-xs font-semibold text-slate-700">Notifications</span>
      <button id="btn-bell-mark-all-read" class="text-[10px] font-bold text-indigo-600 hover:text-indigo-800 transition-colors">
        Mark all read
      </button>
    </div>
    <!-- List -->
    <div id="bell-list" class="divide-y divide-slate-100 max-h-72 overflow-y-auto">
      <!-- Dynamic notifications inserted here -->
    </div>
    <!-- Footer -->
    <div class="border-t border-slate-100 bg-slate-50/70 text-center">
      <a href="/module/NOTIFY/" class="block py-2 text-[10px] font-bold text-slate-500 hover:text-indigo-600 transition-colors">
        View all notifications
      </a>
    </div>
  </div>
</div>
